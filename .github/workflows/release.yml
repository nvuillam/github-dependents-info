name: Release
on:
  release:
    types:
      - published

permissions: read-all

jobs:
  publish:
    environment: release
    permissions:
      contents: read
      id-token: write # required for PyPI trusted publishing (OIDC)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        poetry-version: ["2.2.1"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6 # zizmor: ignore[ref-version-mismatch]
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 # zizmor: ignore[ref-version-mismatch]
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run image
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1 # v4.0.0 # zizmor: ignore[ref-version-mismatch]
        with:
          poetry-version: ${{ matrix.poetry-version }}
      - name: Build distribution
        run: poetry build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0 # zizmor: ignore[ref-version-mismatch]

  # Build & push docker image
  build_push_docker:
    name: Build & Push docker image
    runs-on: ubuntu-latest
    needs: publish
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6 # zizmor: ignore[ref-version-mismatch]
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4 # zizmor: ignore[ref-version-mismatch]

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4 # zizmor: ignore[ref-version-mismatch]

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 # zizmor: ignore[ref-version-mismatch]
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 # zizmor: ignore[ref-version-mismatch]
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> ${GITHUB_ENV}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7 # zizmor: ignore[ref-version-mismatch]
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_VERSION=latest
            GITHUB_DEPENDENTS_INFO_VERSION=${{ github.event.release.tag_name }}
          load: false
          push: true
          tags: |
            nvuillam/github-dependents-info:${{ github.event.release.tag_name }}
            nvuillam/github-dependents-info:latest
            ghcr.io/nvuillam/github-dependents-info:${{ github.event.release.tag_name }}
            ghcr.io/nvuillam/github-dependents-info:latest
